name: iOS validation

on:
  push:
    paths:
      - "LunaPlateIOS/**"
      - "tests/test_ios_care_content.py"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "LunaPlateIOS/**"
      - "tests/test_ios_care_content.py"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

jobs:
  content-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate content and recommendation API
        run: python -m unittest discover -s tests -v

  xcode-tests:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Select an available iPhone simulator
        id: simulator
        shell: bash
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(d["udid"] for runtime in data["devices"].values() for d in runtime if d["name"].startswith("iPhone")))')
          echo "id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
      - name: Build and run unit tests
        run: |
          xcodebuild test \
            -project LunaPlateIOS/LunaPlateIOS.xcodeproj \
            -scheme LunaPlateIOS \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            CODE_SIGNING_ALLOWED=NO
