name: iOS validation

concurrency:
  group: ios-validation-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - "LunaPlateIOS/**"
      - "tests/test_ios_care_content.py"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "LunaPlateIOS/**"
      - "tests/test_ios_care_content.py"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

jobs:
  content-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate content and recommendation API
        run: python -m unittest discover -s tests -v

  xcode-tests:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Select an available iPhone simulator
        id: simulator
        shell: bash
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(d["udid"] for runtime in data["devices"].values() for d in runtime if d["name"].startswith("iPhone")))')
          echo "id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
      - name: Build and run unit tests
        run: |
          xcodebuild test \
            -project LunaPlateIOS/LunaPlateIOS.xcodeproj \
            -scheme LunaPlateIOS \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            CODE_SIGNING_ALLOWED=NO
      - name: Build the Release configuration
        run: |
          xcodebuild build \
            -project LunaPlateIOS/LunaPlateIOS.xcodeproj \
            -scheme LunaPlateIOS \
            -configuration Release \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            CODE_SIGNING_ALLOWED=NO
      - name: Install and launch the Release app
        shell: bash
        run: |
          APP_PATH=$(find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/Release-iphonesimulator/LunaPlate.app" -print -quit)
          test -n "$APP_PATH"
          xcrun simctl boot "${{ steps.simulator.outputs.id }}" || true
          xcrun simctl bootstatus "${{ steps.simulator.outputs.id }}" -b
          xcrun simctl install "${{ steps.simulator.outputs.id }}" "$APP_PATH"
          xcrun simctl launch "${{ steps.simulator.outputs.id }}" com.k599.LunaPlate
          sleep 3
          xcrun simctl io "${{ steps.simulator.outputs.id }}" screenshot "$RUNNER_TEMP/lunaplate-release.png"
          test -s "$RUNNER_TEMP/lunaplate-release.png"
      - uses: actions/upload-artifact@v4
        with:
          name: lunaplate-release-smoke
          path: ${{ runner.temp }}/lunaplate-release.png
          if-no-files-found: error
